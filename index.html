<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Quiz Cidadão – Seus Direitos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(145deg, #1e3c72 0%, #2a5298 100%);
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }
    .container {
      max-width: 700px;
      width: 100%;
      background: rgba(255,255,255,0.95);
      border-radius: 2rem;
      box-shadow: 0 20px 35px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .header {
      background: #0b2b44;
      color: white;
      padding: 1rem 1.5rem;
      text-align: center;
      font-weight: bold;
    }
    .content { padding: 2rem; }
    .question-text {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      line-height: 1.3;
      color: #0b2b44;
    }
    .alternativas { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.5rem; }
    .alt-btn {
      background: #f1f5f9;
      border: 2px solid #cbd5e1;
      border-radius: 1rem;
      padding: 0.8rem 1rem;
      font-size: 1rem;
      text-align: left;
      cursor: pointer;
      transition: 0.1s;
    }
    .alt-btn:hover { background: #e2e8f0; transform: scale(1.01); }
    .alt-btn.selected { background: #d9f0e6; border-color: #2e7d32; }
    .feedback {
      background: #e9ecef;
      border-radius: 1rem;
      padding: 1rem;
      margin: 1rem 0;
      display: none;
      border-left: 6px solid #2a5298;
    }
    .feedback.correct { border-left-color: #2e7d32; background: #e0f2e9; }
    .feedback.wrong { border-left-color: #c62828; background: #ffe6e6; }
    .next-btn {
      background: #2e7d32;
      color: white;
      border: none;
      border-radius: 2rem;
      padding: 0.8rem 1.5rem;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      transition: 0.2s;
    }
    .next-btn:disabled { background: #9e9e9e; cursor: not-allowed; }
    .progress-info {
      display: flex;
      justify-content: space-between;
      margin-bottom: 1rem;
      font-weight: bold;
      flex-wrap: wrap;
    }
    .streak-bar {
      background: #e0e0e0;
      border-radius: 1rem;
      height: 10px;
      width: 100%;
      margin: 0.5rem 0;
      overflow: hidden;
    }
    .streak-fill {
      background: #4caf50;
      width: 0%;
      height: 100%;
      transition: width 0.2s;
    }
    .hint-area {
      background: #fff3cd;
      padding: 0.5rem;
      border-radius: 0.5rem;
      margin-top: 1rem;
      font-size: 0.9rem;
      border-left: 4px solid #ffc107;
    }
    .conquistas {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.5rem;
      margin-bottom: 1rem;
    }
    .badge {
      background: #ffc107;
      border-radius: 2rem;
      padding: 0.2rem 0.7rem;
      font-size: 0.7rem;
      font-weight: bold;
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
    }
    .hidden { display: none; }
    footer {
      background: #eef2f5;
      padding: 0.8rem;
      text-align: center;
      font-size: 0.7rem;
      color: #2c3e66;
    }
    .avatar-options { display: flex; gap: 1rem; justify-content: center; margin: 0.5rem 0; }
    .avatar { cursor: pointer; text-align: center; padding: 0.5rem; border-radius: 0.5rem; background: #e9ecef; }
    .avatar.selected { background: #4caf50; color: white; }
    .interest-options { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
    .interest-options label { display: inline-flex; align-items: center; gap: 0.3rem; background: #e9ecef; padding: 0.3rem 0.8rem; border-radius: 2rem; cursor: pointer; }
    button { background: #2e7d32; color: white; border: none; border-radius: 2rem; padding: 0.8rem 1.5rem; font-size: 1rem; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s; }
    button:hover { background: #1b5e20; }
    .form-group { margin-bottom: 1.2rem; }
    input, select { width: 100%; padding: 0.6rem; border-radius: 0.5rem; border: 1px solid #ccc; font-size: 1rem; }
  </style>
</head>
<body>
<div class="container" id="app">
  <!-- TELA DE IDENTIFICAÇÃO -->
  <div id="identificacao">
    <div class="header">🧠 CIDADÃO QUIZ – IDENTIFICAÇÃO</div>
    <div class="content">
      <div class="form-group"><label>👤 Seu nome:</label><input type="text" id="nome" placeholder="Ex: João Silva"></div>
      <div class="form-group"><label>🎂 Idade:</label><input type="number" id="idade" min="12" max="99" placeholder="16"></div>
      <div class="form-group">
        <label>🧑‍🎨 Escolha seu avatar:</label>
        <div class="avatar-options">
          <div class="avatar" data-avatar="estudante">👨‍🎓 Estudante</div>
          <div class="avatar" data-avatar="profissional">👩‍💼 Profissional</div>
          <div class="avatar" data-avatar="cidadao">🧙‍♂️ Cidadão</div>
        </div>
        <input type="hidden" id="avatar" value="estudante">
      </div>
      <div class="form-group">
        <label>📚 Área de interesse (opcional):</label>
        <div class="interest-options">
          <label><input type="checkbox" value="consumidor"> Consumidor</label>
          <label><input type="checkbox" value="trabalho"> Trabalho</label>
          <label><input type="checkbox" value="penal"> Penal</label>
          <label><input type="checkbox" value="constitucional"> Constitucional</label>
          <label><input type="checkbox" value="todos" checked> Todos</label>
        </div>
      </div>
      <button id="btn-iniciar-quiz">🚀 INICIAR JORNADA</button>
      <p style="margin-top:1rem; font-size:0.8rem;">Seus dados ficam apenas no seu navegador.</p>
    </div>
  </div>

  <!-- TELA DO QUIZ -->
  <div id="quiz-container" class="hidden">
    <div class="header">🧠 CIDADÃO QUIZ</div>
    <div class="content">
      <div class="progress-info">
        <span id="nivel-info">Nível 1</span>
        <span>⭐ Pontos: <span id="pontuacao">0</span></span>
        <span>🔥 Sequência: <span id="sequencia">0</span></span>
      </div>
      <div class="streak-bar"><div class="streak-fill" id="streak-fill"></div></div>
      <div id="conquistas-area" class="conquistas"></div>
      <div id="pergunta-area"></div>
      <div id="hint-area" class="hint-area hidden"></div>
      <div id="feedback-area" class="feedback"></div>
      <button id="next-btn" class="next-btn" disabled>Responder & Próxima ❯</button>
    </div>
  </div>
  <footer>⚖️ Baseado na CF/88, CDC, ECA, CLT, CPC, CPP, CTB.</footer>
</div>
<script src="perguntas.js"></script>
<script>
  // --- DADOS DO USUÁRIO ---
  let userData = null;

  // --- ESTADO DO QUIZ ---
  let perguntas = [];               // perguntas do Nível 1
  let indiceAtual = 0;
  let pontuacao = 0;
  let sequenciaAcertos = 0;
  let respostaSelecionada = null;
  let jaRespondeu = false;
  let timerHint = null;
  let nivelAtual = 1;               // 1 ou 2
  const PONTOS_N1_INICIO = 5;       // primeira pergunta
  const PONTOS_N1_INCREMENTO = 1;   // +1 a cada pergunta

  // Conquistas (medalhas)
  let conquistas = [];

  // Elementos DOM
  const identificacaoDiv = document.getElementById('identificacao');
  const quizContainer = document.getElementById('quiz-container');
  const btnIniciar = document.getElementById('btn-iniciar-quiz');
  const perguntaArea = document.getElementById('pergunta-area');
  const feedbackDiv = document.getElementById('feedback-area');
  const nextBtn = document.getElementById('next-btn');
  const pontuacaoSpan = document.getElementById('pontuacao');
  const sequenciaSpan = document.getElementById('sequencia');
  const streakFill = document.getElementById('streak-fill');
  const hintArea = document.getElementById('hint-area');
  const nivelInfoSpan = document.getElementById('nivel-info');
  const conquistasArea = document.getElementById('conquistas-area');

  // --- Carregar conquistas do localStorage e exibir
  function carregarConquistas() {
    const salvas = localStorage.getItem("cidadao_conquistas");
    if (salvas) conquistas = JSON.parse(salvas);
    else conquistas = [];
    atualizarDisplayConquistas();
  }

  function salvarConquistas() {
    localStorage.setItem('cidadao_conquistas', JSON.stringify(conquistas));
  }

  function adicionarConquista(conquista) {
    if (!conquistas.some(c => c.nome === conquista.nome)) {
      conquistas.push(conquista);
      salvarConquistas();
      atualizarDisplayConquistas();
      const notif = document.createElement("div");
      notif.className = "feedback correct";
      notif.style.marginTop = "0.5rem";
      notif.style.padding = "0.5rem";
      notif.style.borderRadius = "0.5rem";
      notif.innerHTML = `<span style="font-size:1.2rem;">${conquista.icone}</span> <strong>${conquista.nome}</strong> - ${conquista.descricao}`;
      feedbackDiv.parentNode.insertBefore(notif, feedbackDiv.nextSibling);
      setTimeout(() => notif.remove(), 5000);
    }
  }

  function atualizarDisplayConquistas() {
    if (!conquistasArea) return;
    conquistasArea.innerHTML = conquistas.map(c => `<span class="badge" title="${c.descricao}">${c.icone} ${c.nome}</span>`).join("");
  }

  // --- Avatar e interesses ---
  const avatarDivs = document.querySelectorAll('.avatar');
  const avatarInput = document.getElementById('avatar');
  avatarDivs.forEach(div => {
    div.addEventListener('click', () => {
      avatarDivs.forEach(d => d.classList.remove('selected'));
      div.classList.add('selected');
      avatarInput.value = div.dataset.avatar;
    });
  });
  if (avatarDivs.length) avatarDivs[0].classList.add('selected');

  // --- Iniciar quiz após identificação ---
  btnIniciar.addEventListener('click', () => {
    const nome = document.getElementById('nome').value.trim();
    const idade = parseInt(document.getElementById('idade').value);
    const avatar = avatarInput.value;
    const interesses = Array.from(document.querySelectorAll('.interest-options input:checked')).map(cb => cb.value);
    if (!nome) { alert('Por favor, digite seu nome.'); return; }
    if (isNaN(idade) || idade < 12 || idade > 99) { alert('Idade inválida (12 a 99 anos).'); return; }
    userData = { nome, idade, avatar, interesses };
    localStorage.setItem('cidadao_user', JSON.stringify(userData));
    identificacaoDiv.style.display = 'none';
    quizContainer.classList.remove('hidden');
    carregarConquistas();
    iniciarNivel1();
  });

  // --- Carregar Nível 1 do banco de perguntas ---
  // Conquistas temáticas por nível
  const conquistasPorNivel = {
    1: [
      { icone: "🏅", nome: "Saber", descricao: "5 acertos consecutivos", sequencia: 5 },
      { icone: "🩺", nome: "Jaleco da Justiça", descricao: "10 acertos consecutivos", sequencia: 10 },
      { icone: "💎", nome: "Diamante da Cidadania", descricao: "15 acertos consecutivos", sequencia: 15 },
      { icone: "🧠", nome: "Sabedoria", descricao: "20 acertos consecutivos", sequencia: 20 },
      { icone: "🌟", nome: "Estrela dos Direitos", descricao: "25 acertos consecutivos", sequencia: 25 },
      { icone: "⚖️", nome: "Balança da Equidade", descricao: "30 acertos consecutivos", sequencia: 30 },
      { icone: "🛡️", nome: "Escudo do Consumidor", descricao: "35 acertos consecutivos", sequencia: 35 },
      { icone: "📜", nome: "Pergaminho do ECA", descricao: "40 acertos consecutivos", sequencia: 40 },
      { icone: "🏭", nome: "Capacete do Trabalhador", descricao: "45 acertos consecutivos", sequencia: 45 },
      { icone: "⚙️", nome: "Engrenagem da Justiça", descricao: "50 acertos consecutivos", sequencia: 50 },
      { icone: "🚗", nome: "Selo do Trânsito", descricao: "55 acertos consecutivos", sequencia: 55 },
      { icone: "🔒", nome: "Escudo da LGPD", descricao: "60 acertos consecutivos", sequencia: 60 }
    ],
    2: [
      { icone: "⚡", nome: "Relâmpago do CDC", descricao: "5 acertos consecutivos (N2)", sequencia: 5 },
      { icone: "🛡️", nome: "Escudo do ECA", descricao: "10 acertos consecutivos (N2)", sequencia: 10 },
      { icone: "🏅", nome: "Mestre da CLT", descricao: "15 acertos consecutivos (N2)", sequencia: 15 },
      { icone: "⚙️", nome: "Engrenagem do CPC", descricao: "20 acertos consecutivos (N2)", sequencia: 20 },
      { icone: "🔍", nome: "Detetive do CPP", descricao: "25 acertos consecutivos (N2)", sequencia: 25 },
      { icone: "🚦", nome: "Guardião do Trânsito", descricao: "30 acertos consecutivos (N2)", sequencia: 30 },
      { icone: "🔒", nome: "Protetor da LGPD", descricao: "35 acertos consecutivos (N2)", sequencia: 35 }
    ]
  };

  function iniciarNivel1() {
  // Limpa conquistas antigas para evitar medalhas fantasmas
  conquistas = [];
  localStorage.removeItem("cidadao_conquistas");
  atualizarDisplayConquistas();
    if (typeof bancoPerguntas === 'undefined') {
      perguntaArea.innerHTML = '<p style="color:red;">Erro: banco de perguntas não carregado.</p>';
      return;
    }
    perguntas = bancoPerguntas.filter(q => q.nivel === 1);
    if (perguntas.length === 0) {
      perguntaArea.innerHTML = '<p style="color:red;">Nenhuma pergunta de Nível 1 encontrada.</p>';
      return;
    }
    indiceAtual = 0;
    pontuacao = 0;
    sequenciaAcertos = 0;
    atualizarInterface();
    carregarPergunta();
  }

  function atualizarInterface() {
    pontuacaoSpan.innerText = pontuacao;
    sequenciaSpan.innerText = sequenciaAcertos;
    const percent = (sequenciaAcertos / 5) * 100;
    streakFill.style.width = Math.min(percent, 100) + '%';
  }

  function carregarPergunta() {
    if (indiceAtual >= perguntas.length) {
      finalizarNivel();
      return;
    }
    const p = perguntas[indiceAtual];
    const valorPergunta = PONTOS_N1_INICIO + (indiceAtual * PONTOS_N1_INCREMENTO);
    let html = `<div class="question-text">${p.texto}</div>`;
    html += `<div class="alternativas" id="alternativas">`;
    p.alternativas.forEach((alt, idx) => {
      html += `<div class="alt-btn" data-alt="${idx}">${String.fromCharCode(65+idx)}) ${alt}</div>`;
    });
    html += `</div>`;
    perguntaArea.innerHTML = html;

    document.querySelectorAll('.alt-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        if (jaRespondeu) return;
        const idx = parseInt(btn.dataset.alt);
        respostaSelecionada = idx;
        document.querySelectorAll('.alt-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        nextBtn.disabled = false;
        if (timerHint) clearTimeout(timerHint);
        hintArea.classList.add('hidden');
      });
    });

    // Dica progressiva
    if (timerHint) clearTimeout(timerHint);
    hintArea.classList.add('hidden');
    hintArea.innerHTML = '';
    timerHint = setTimeout(() => {
      if (!jaRespondeu && respostaSelecionada === null) {
        hintArea.innerHTML = `<strong>🔍 Dica:</strong> ${p.artigo}`;
        hintArea.classList.remove('hidden');
        setTimeout(() => {
          if (!jaRespondeu && respostaSelecionada === null) {
            hintArea.innerHTML = `<strong>🔍 Dica avançada:</strong> ${p.explicacao.substring(0, 100)}...`;
          }
        }, 10000);
      }
    }, 10000);

    feedbackDiv.style.display = 'none';
    feedbackDiv.innerHTML = '';
    nextBtn.disabled = true;
    jaRespondeu = false;
    respostaSelecionada = null;
    nextBtn.innerText = 'Responder & Próxima ❯';
  }

  function responder() {
    if (respostaSelecionada === null) return;
    const p = perguntas[indiceAtual];
    const correta = (respostaSelecionada === p.correta);
    const valorPergunta = PONTOS_N1_INICIO + (indiceAtual * PONTOS_N1_INCREMENTO);
    let pontosGanhos = valorPergunta;

    if (correta) {
      sequenciaAcertos++;
      // Verifica conquistas a cada 5 acertos consecutivos
      if (sequenciaAcertos % 5 === 0 && sequenciaAcertos > 0) {
        pontosGanhos += 5;
        const conquistasNivel = conquistasPorNivel[nivelAtual];
        const conquista = conquistasNivel.find(c => c.sequencia === sequenciaAcertos);
        if (conquista) {
          adicionarConquista(conquista);
        } else {
          adicionarConquista({ icone: "🏅", nome: `${sequenciaAcertos} acertos consecutivos`, descricao: "Sequência de acertos" });
        }
        const bonusMsg = document.createElement("div");
        bonusMsg.className = "feedback correct";
        bonusMsg.style.marginTop = "0.5rem";
        bonusMsg.style.padding = "0.5rem";
        bonusMsg.style.borderRadius = "0.5rem";
        bonusMsg.innerHTML = `🎁 <strong>BÔNUS DE SEQUÊNCIA!</strong> Você acertou ${sequenciaAcertos} perguntas seguidas! +5 pontos extras.`;
        feedbackDiv.parentNode.insertBefore(bonusMsg, feedbackDiv.nextSibling);
        setTimeout(() => bonusMsg.remove(), 4000);
      }
      pontuacao += pontosGanhos;
      atualizarInterface();
      feedbackDiv.className = 'feedback correct';
      feedbackDiv.innerHTML = `<strong>✅ CORRETO!</strong><br>📖 ${p.artigo}<br>💡 ${p.explicacao}`;
    } else {
      sequenciaAcertos = 0;
      atualizarInterface();
      const alternativaCorreta = p.alternativas[p.correta];
      feedbackDiv.className = 'feedback wrong';
      feedbackDiv.innerHTML = `<strong>❌ ERRADO.</strong> A resposta certa é: ${String.fromCharCode(65+p.correta)}) ${alternativaCorreta}<br>📖 ${p.artigo}<br>💡 ${p.explicacao}`;
    }
    feedbackDiv.style.display = 'block';
    jaRespondeu = true;
    nextBtn.disabled = false;
    nextBtn.innerText = 'Próxima ➡';
    if (timerHint) clearTimeout(timerHint);
    hintArea.classList.add('hidden');
  }

  function avancar() {
    if (!jaRespondeu) return;
    indiceAtual++;
    if (indiceAtual < perguntas.length) {
      carregarPergunta();
    } else {
      finalizarNivel();
    }
  }

  function finalizarNivel() {
    perguntaArea.innerHTML = `<div style="background:#e0f2e9; padding:1rem; border-radius:1rem; text-align:center;">
      <h3>🏆 Nível 1 concluído!</h3>
      <p>Pontuação final: ${pontuacao} pontos</p>
      <p>Maior sequência de acertos: ${sequenciaAcertos}</p>
      <p>Conquistas obtidas: ${conquistas.length}</p>
      <button id="reiniciar-quiz" style="margin-top:1rem;">🔁 Reiniciar Quiz</button>
    </div>`;
    const reiniciarBtn = document.getElementById('reiniciar-quiz');
    if (reiniciarBtn) reiniciarBtn.addEventListener('click', () => location.reload());
  }

  // Eventos dos botões
  nextBtn.addEventListener('click', () => {
    if (!jaRespondeu && respostaSelecionada !== null) {
      responder();
    } else if (jaRespondeu) {
      avancar();
    }
  });
</script>
</body>
</html>
