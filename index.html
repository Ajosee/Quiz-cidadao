<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Quiz Cidadão – Seus Direitos</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: linear-gradient(145deg, #1e3c72 0%, #2a5298 100%);
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }
    .container {
      max-width: 700px;
      width: 100%;
      background: rgba(255,255,255,0.95);
      border-radius: 2rem;
      box-shadow: 0 20px 35px rgba(0,0,0,0.3);
      overflow: hidden;
      transition: all 0.2s;
    }
    .header {
      background: #0b2b44;
      color: white;
      padding: 1rem 1.5rem;
      text-align: center;
      font-weight: bold;
    }
    .content {
      padding: 2rem;
    }
    .form-group {
      margin-bottom: 1.2rem;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.3rem;
      color: #1e2a3a;
    }
    input, select {
      width: 100%;
      padding: 0.6rem;
      border-radius: 0.5rem;
      border: 1px solid #ccc;
      font-size: 1rem;
    }
    .avatar-options {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin: 0.5rem 0;
    }
    .avatar {
      cursor: pointer;
      text-align: center;
      padding: 0.5rem;
      border-radius: 0.5rem;
      transition: 0.1s;
      background: #e9ecef;
    }
    .avatar.selected {
      background: #4caf50;
      color: white;
    }
    .interest-options {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .interest-options label {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: #e9ecef;
      padding: 0.3rem 0.8rem;
      border-radius: 2rem;
      cursor: pointer;
    }
    button {
      background: #2e7d32;
      color: white;
      border: none;
      border-radius: 2rem;
      padding: 0.8rem 1.5rem;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      transition: 0.2s;
    }
    button:hover {
      background: #1b5e20;
    }
    .hidden {
      display: none;
    }
    footer {
      background: #eef2f5;
      padding: 0.8rem;
      text-align: center;
      font-size: 0.7rem;
      color: #2c3e66;
    }
  </style>
</head>
<body>
<div class="container" id="app">
  <div class="header">🧠 CIDADÃO QUIZ – IDENTIFICAÇÃO</div>
  <div class="content" id="identificacao">
    <div class="form-group">
      <label>👤 Seu nome:</label>
      <input type="text" id="nome" placeholder="Ex: João Silva">
    </div>
    <div class="form-group">
      <label>🎂 Idade:</label>
      <input type="number" id="idade" min="12" max="99" placeholder="16">
    </div>
    <div class="form-group">
      <label>🧑‍🎨 Escolha seu avatar:</label>
      <div class="avatar-options">
        <div class="avatar" data-avatar="estudante">👨‍🎓 Estudante</div>
        <div class="avatar" data-avatar="profissional">👩‍💼 Profissional</div>
        <div class="avatar" data-avatar="cidadao">🧙‍♂️ Cidadão</div>
      </div>
      <input type="hidden" id="avatar" value="estudante">
    </div>
    <div class="form-group">
      <label>📚 Área de interesse (opcional):</label>
      <div class="interest-options">
        <label><input type="checkbox" value="consumidor"> Consumidor</label>
        <label><input type="checkbox" value="trabalho"> Trabalho</label>
        <label><input type="checkbox" value="penal"> Penal</label>
        <label><input type="checkbox" value="constitucional"> Constitucional</label>
        <label><input type="checkbox" value="todos" checked> Todos</label>
      </div>
    </div>
    <button id="btn-iniciar-quiz">🚀 INICIAR JORNADA</button>
    <p style="margin-top:1rem; font-size:0.8rem; color:#555;">Seus dados ficam apenas no seu navegador. Usaremos para personalizar sua experiência.</p>
  </div>
  <div id="quiz-container" class="hidden">
    <!-- Aqui será carregado o quiz propriamente dito -->
    <div class="header" id="quiz-header">🧠 CIDADÃO QUIZ</div>
    <div class="content" id="quiz-content">
      <!-- O conteúdo dinâmico do quiz virá via JS -->
    </div>
  </div>
  <footer>⚖️ Baseado na CF/88, CDC, ECA, CLT, CPC, CPP, CTB.</footer>
</div>

<script src="perguntas.js"></script>
<script>
  // DOM elements
  const identificacaoDiv = document.getElementById('identificacao');
  const quizContainer = document.getElementById('quiz-container');
  const btnIniciar = document.getElementById('btn-iniciar-quiz');

  // Avatar selection
  const avatarDivs = document.querySelectorAll('.avatar');
  const avatarInput = document.getElementById('avatar');
  avatarDivs.forEach(div => {
    div.addEventListener('click', () => {
      avatarDivs.forEach(d => d.classList.remove('selected'));
      div.classList.add('selected');
      avatarInput.value = div.dataset.avatar;
    });
  });
  // Seleciona primeiro avatar por padrão
  avatarDivs[0].classList.add('selected');

  // Salvar dados e iniciar quiz
  btnIniciar.addEventListener('click', () => {
    const nome = document.getElementById('nome').value.trim();
    const idade = parseInt(document.getElementById('idade').value);
    const avatar = avatarInput.value;
    const interesses = Array.from(document.querySelectorAll('.interest-options input:checked')).map(cb => cb.value);
    
    if (!nome) {
      alert('Por favor, digite seu nome.');
      return;
    }
    if (isNaN(idade) || idade < 12 || idade > 99) {
      alert('Idade inválida (12 a 99 anos).');
      return;
    }

    const userData = { nome, idade, avatar, interesses };
    localStorage.setItem('cidadao_user', JSON.stringify(userData));
    
    // Esconder tela de identificação e mostrar o quiz
    identificacaoDiv.style.display = 'none';
    quizContainer.classList.remove('hidden');
    
    // Iniciar o quiz (chamar função principal)
    iniciarQuiz();
  });

  // Função principal do quiz (será expandida nas próximas etapas)
  // Por enquanto, uma versão simples para testar a transição
  function iniciarQuiz() {
    const quizContent = document.getElementById('quiz-content');
    quizContent.innerHTML = '<p style="text-align:center;">Carregando perguntas... Aguarde.</p>';
    
    // Simulação: mostrar uma mensagem de sucesso (depois substituiremos pelo quiz real)
    setTimeout(() => {
      quizContent.innerHTML = `
        <div style="background:#e0f2e9; padding:1rem; border-radius:1rem;">
          <h3>✅ Identificação concluída!</h3>
          <p>Em breve você verá as perguntas do Nível 1 aqui.</p>
          <p>Seus dados foram salvos no navegador.</p>
        </div>
      `;
    }, 500);
  }
</script>
</body>
</html>
